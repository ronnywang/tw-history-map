# GDAL OSM driver config — 只保留渲染需要的欄位

[general]
# 不要把所有 tag 都放進 other_tags
report_all_tags=no
report_all_nodes=no
report_all_ways=no

# 有以下 key 的 closed way 會被視為 polygon（面積）而非 line
closed_ways_are_polygons=aeroway,amenity,boundary,building,craft,geological,historic,landuse,leisure,military,natural,office,place,shop,sport,tourism,highway=platform,public_transport=platform

[points]
osm_id=yes
attributes=name,name:zh,place,natural,amenity,historic,tourism,shop,railway,aeroway,military

[lines]
osm_id=yes
attributes=name,name:zh,highway,railway,waterway,natural,barrier,man_made

[multipolygons]
osm_id=yes
attributes=name,name:zh,type,aeroway,amenity,boundary,building,craft,geological,historic,land_area,landuse,leisure,military,natural,office,place,shop,sport,tourism,waterway

[multilinestrings]
osm_id=yes
attributes=name,name:zh,type

[other_relations]
osm_id=yes
attributes=name,name:zh,type,boundary,admin_level
